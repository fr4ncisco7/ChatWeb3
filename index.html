<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Web3 Alpha Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #58a6ff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #chat-container { width: 95%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-top: 20px; display: flex; flex-direction: column; height: 60vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 85%; word-break: break-all; }
        .sent { background: #238636; color: white; align-self: flex-end; }
        .received { background: #30363d; color: #c9d1d9; align-self: flex-start; }
        .input-area { border-top: 1px solid #30363d; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #1f6feb; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #0d1117; color: #484f58; cursor: not-allowed; }
        #walletAddress { font-size: 0.7em; color: #8b949e; margin-top: 10px; background: #161b22; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>📡 WEB3 CHAT _LIVE_</h2>
    
    <button id="connectBtn" onclick="connectExperience()">Conectar MetaMask</button>
    <div id="walletAddress">Aguardando conexão...</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg received">Sistema: Conecte a carteira para ver as mensagens.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Sua mensagem na rede..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>

    <script>
    // Endereço confirmado pelo seu print
    const contractAddress = "0xc3fF5b372805F7c0123C44De6B53Aa40D0CaFE18"; 
    
    // ABI simplificada (garanta que o nome das funções é igual ao contrato)
    const abi = [ 
        "function enviarMensagem(string _texto) public", 
        "function getMensagens() view returns (tuple(address remetente, string texto, uint256 timestamp)[])" 
    ];

    let provider, signer, contract;

    async function connectExperience() {
        if (!window.ethereum) return alert("MetaMask não encontrada!");

        try {
            // Garante que a MetaMask está na Sepolia antes de tudo
            const chainId = await window.ethereum.request({ method: 'eth_chainId' });
            if (chainId !== '0xaa36a7') { // 0xaa36a7 é o ID da Sepolia em Hex
                alert("Por favor, mude sua MetaMask para a rede Sepolia!");
                return;
            }

            // Solicita acesso
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            // Inicialização padrão Ethers v5
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);

            // Interface
            document.getElementById('walletAddress').innerText = "CONECTADO (SEPOLIA): " + accounts[0];
            document.getElementById('connectBtn').innerText = "Conectado ✅";
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            console.log("Sucesso! Contrato pronto.");
            refreshChat();

        } catch (err) {
            console.error(err);
            alert("Erro na conexão: " + err.message);
        }
    }

    async function refreshChat() {
        if (!contract) return;
        try {
            const mensagens = await contract.getMensagens();
            const container = document.getElementById('messages');
            container.innerHTML = ""; 
            
            const userAddr = (await signer.getAddress()).toLowerCase();

            mensagens.forEach(msg => {
                const isMe = msg.remetente.toLowerCase() === userAddr;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'received'}`;
                div.innerHTML = `<strong>${isMe ? "Você" : msg.remetente.substring(0,6)}:</strong> ${msg.texto}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.warn("Erro ao ler mensagens:", e);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        if (!input.value) return;

        try {
            const tx = await contract.enviarMensagem(input.value);
            input.value = "Aguardando rede...";
            await tx.wait();
            input.value = "";
            refreshChat();
        } catch (err) {
            alert("Erro ao enviar!");
            input.value = "";
        }
    }
</script>
</body>
</html>
