<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Web3 Alpha Chat</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #58a6ff; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        #chat-container { width: 90%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-top: 20px; display: flex; flex-direction: column; height: 60vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 80%; word-break: break-all; }
        .sent { background: #238636; color: white; align-self: flex-end; }
        .received { background: #30363d; color: #c9d1d9; align-self: flex-start; }
        .input-area { border-top: 1px solid #30363d; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #1f6feb; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #388bfd; }
        #walletAddress { font-size: 0.7em; color: #8b949e; margin-top: 10px; background: #161b22; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>📡 WEB3 CHAT _LIVE_</h2>
    
    <button id="connectBtn" onclick="connectExperience()">Conectar MetaMask</button>
    <div id="walletAddress">Aguardando conexão...</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg received">Sistema: Conecte a carteira para carregar o histórico.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Sua mensagem na rede...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // 1. Corrija o 00x para 0x
const contractAddress = "0xf6e25546515eeBb9F8DA6BCBC830F8C16c377f01"; 

// 2. Lógica de envio com bloqueio de botão
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const sendBtn = document.querySelector("button[onclick='sendMessage()']");
    const text = input.value;

    if (!text || !contract) return alert("Conecte a carteira!");

    try {
        // Bloqueia interface
        input.disabled = true;
        sendBtn.disabled = true;
        sendBtn.innerText = "⌛...";

        const tx = await contract.enviarMensagem(text);
        console.log("Transação enviada:", tx.hash);
        
        await tx.wait(); // Aguarda confirmação na rede
        
        input.value = "";
        refreshChat(); 
    } catch (err) {
        console.error("Erro ao enviar:", err);
        alert("Erro na transação ou usuário cancelou.");
    } finally {
        // Libera interface
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.innerText = "Enviar";
    }
}

// 3. Verificação de conta ativa (Correção de bug de refresh)
async function refreshChat() {
    if (!contract) return;
    try {
        const mensagens = await contract.getMensagens();
        const container = document.getElementById('messages');
        container.innerHTML = ""; 

        // Pega o endereço atual de forma segura
        const userAddress = (await signer.getAddress()).toLowerCase();

        mensagens.forEach(msg => {
            const isMe = msg.remetente.toLowerCase() === userAddress;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            
            const addrLabel = isMe ? "Você" : msg.remetente.substring(0, 6) + "...";
            div.innerHTML = `<b>${addrLabel}:</b> ${msg.texto}`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    } catch (err) {
        console.log("Erro ao carregar (talvez o chat ainda esteja vazio):", err);
    }
}
    </script>
</body>
</html>
