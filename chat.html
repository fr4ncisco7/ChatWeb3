<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Web3 Alpha Chat</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #58a6ff; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        #chat-container { width: 90%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-top: 20px; display: flex; flex-direction: column; height: 60vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 80%; word-break: break-all; }
        .sent { background: #238636; color: white; align-self: flex-end; }
        .received { background: #30363d; color: #c9d1d9; align-self: flex-start; }
        .input-area { border-top: 1px solid #30363d; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #1f6feb; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #388bfd; }
        #walletAddress { font-size: 0.7em; color: #8b949e; margin-top: 10px; background: #161b22; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>📡 WEB3 CHAT _LIVE_</h2>
    
    <button id="connectBtn" onclick="connectExperience()">Conectar MetaMask</button>
    <div id="walletAddress">Aguardando conexão...</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg received">Sistema: Conecte a carteira para carregar o histórico.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Sua mensagem na rede...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // Configurações Reais do seu Contrato
        const contractAddress = "0xd9145CCE52D386f254917e481eB44e9943F39138"; 
        const abi = [ 
            "function enviarMensagem(string _texto) public", 
            "function getMensagens() view returns (tuple(address remetente, string texto, uint256 timestamp)[])" 
        ];

        let provider;
        let signer;
        let contract;

        // Lógica de Conexão que você solicitou (Baseada no Dashboard)
        async function connectExperience() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Solicita contas exatamente como no seu exemplo funcional
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];

                    // Inicializa o contrato
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    contract = new ethers.Contract(contractAddress, abi, signer);

                    document.getElementById('walletAddress').innerText = "CONECTADO: " + account;
                    document.getElementById('connectBtn').innerText = "Carteira Ativa ✅";
                    
                    // Carrega as mensagens reais após conectar
                    refreshChat();
                } catch (err) {
                    console.error("Erro na conexão:", err);
                    alert("A conexão foi recusada.");
                }
            } else {
                alert("MetaMask não encontrada!");
            }
        }

        // Função para buscar mensagens reais do seu contrato
        async function refreshChat() {
            if (!contract) return;
            try {
                const mensagens = await contract.getMensagens();
                const container = document.getElementById('messages');
                container.innerHTML = ""; // Limpa o chat

                mensagens.forEach(msg => {
                    const isMe = msg.remetente.toLowerCase() === window.ethereum.selectedAddress.toLowerCase();
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'sent' : 'received'}`;
                    
                    const addrLabel = isMe ? "Você" : msg.remetente.substring(0, 6) + "...";
                    div.innerHTML = `<b>${addrLabel}:</b> ${msg.texto}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error("Erro ao carregar mensagens:", err);
            }
        }

        // Função para enviar mensagem real para a blockchain
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value;

            if (!text || !contract) return alert("Conecte a carteira e escreva algo!");

            try {
                const tx = await contract.enviarMensagem(text);
                input.value = "Processando...";
                
                await tx.wait(); // Espera a mineração na rede
                
                input.value = "";
                refreshChat(); // Atualiza a lista
            } catch (err) {
                console.error("Erro ao enviar:", err);
                input.value = text;
                alert("Erro na transação!");
            }
        }

        // Atualiza o chat a cada 15 segundos para ver novas mensagens de outros membros
        setInterval(refreshChat, 15000);
    </script>
</body>
</html>
