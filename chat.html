<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Web3 Alpha Chat</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #58a6ff; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-top: 20px; display: flex; flex-direction: column; height: 70vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 0.9em; max-width: 80%; }
        .sent { background: #238636; color: white; align-self: flex-end; }
        .received { background: #30363d; color: #c9d1d9; align-self: flex-start; }
        .input-area { border-top: 1px solid #30363d; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; }
        button { background: #1f6feb; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📡 WEB3 CHAT _TEST_</h2>
    <button id="connectBtn" onclick="connect()">Conectar Carteira</button>
    <p id="walletAddress" style="font-size: 0.7em; color: #8b949e;"></p>

    <div id="chat-container">
        <div id="messages">
            <div class="msg received">Sistema: Conecte a carteira para ver as mensagens.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Sua mensagem na rede...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // Configurações fictícias para o seu teste
        const contractAddress = "0xd9145CCE52D386f254917e481eB44e9943F39138"; // Aqui iria o endereço do seu contrato
        const abi = [ "function enviarMensagem(string _texto) public", "function getMensagens() view returns (tuple(address remetente, string texto, uint256 timestamp)[])" ];

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                document.getElementById('walletAddress').innerText = "Conectado como: " + accounts[0];
                document.getElementById('connectBtn').innerText = "Carteira Ativa";
                loadMockMessages(); // Carrega mensagens de exemplo para você ver o visual
            } else {
                alert("Instale a MetaMask!");
            }
        }

        function loadMockMessages() {
            const container = document.getElementById('messages');
            container.innerHTML += `
                <div class="msg received"><b>0x123...:</b> E aí, testando a blockchain?</div>
                <div class="msg sent"><b>Você:</b> Sim! Isso é um teste on-chain.</div>
            `;
        }

        async function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if (!text) return;

            // Lógica real que você usará depois:
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, abi, signer);
                
                // Isso vai falhar agora porque o contractAddress é 0x0
                // Mas a MetaMask abriria aqui:
                const tx = await contract.enviarMensagem(text);
                await tx.wait();
                
                alert("Mensagem enviada com sucesso!");
            } catch (e) {
                console.log("Erro esperado: Contrato não existe ainda.", e);
                // Simulando visualmente para o seu teste:
                document.getElementById('messages').innerHTML += `<div class="msg sent"><b>Você (Simulado):</b> ${text}</div>`;
                document.getElementById('msgInput').value = "";
            }
        }
    </script>
</body>
</html>
